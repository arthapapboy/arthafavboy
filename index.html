<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Store</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f5f5f5; color: #333; }

    header {
      background: #111;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 30px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .card h3 { margin-bottom: 6px; }
    .card p { color: #888; font-size: 0.9rem; margin-bottom: 10px; }
    .price { font-weight: bold; font-size: 1.1rem; color: #111; }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 20px;
      background: #111;
      color: white;
      border-radius: 6px;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .btn:hover { background: #333; }
  </style>
</head>
<body>

  <header>
    <h1>🛍️ My Store</h1>
    <p>Temukan produk terbaik kami</p>
  </header>

  <div class="products">

    <div class="card">
      <img src="[via.placeholder.com](https://via.placeholder.com/300x200)" alt="Produk 1"/>
      <h3>Produk A</h3>
      <p>Deskripsi singkat produk ini.</p>
      <div class="price">Rp 150.000</div>
      <a href="[wa.me](https://wa.me/628xxxxxxxxxx?text=Mau+beli+Produk+A)" class="btn">Beli via WA</a>
    </div>

    <div class="card">
      <img src="[via.placeholder.com](https://via.placeholder.com/300x200)" alt="Produk 2"/>
      <h3>Produk B</h3>
      <p>Deskripsi singkat produk ini.</p>
      <div class="price">Rp 200.000</div>
      <a href="[wa.me](https://wa.me/628xxxxxxxxxx?text=Mau+beli+Produk+B)" class="btn">Beli via WA</a>
    </div>

    <div class="card">
      <img src="[via.placeholder.com](https://via.placeholder.com/300x200)" alt="Produk 3"/>
      <h3>Produk C</h3>
      <p>Deskripsi singkat produk ini.</p>
      <div class="price">Rp 99.000</div>
      <a href="[wa.me](https://wa.me/628xxxxxxxxxx?text=Mau+beli+Produk+C)" class="btn">Beli via WA</a>
    </div>

  </div>

</body>
</html>
